name: Build Resume

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Build PDF and SVG
        run: |
          typst compile --font-path fonts resume.typ resume.pdf
          typst compile --font-path fonts --pages 1 resume.typ resume.svg

      - name: Deploy to build branch
        run: |
          cp resume.pdf /tmp/resume.pdf
          cp resume.svg /tmp/resume.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan build
          git rm -rf .
          cp /tmp/resume.pdf resume.pdf
          cp /tmp/resume.svg resume.svg
          git add resume.pdf resume.svg
          git commit -m "build: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f origin build
